<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Map</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        :root {
            color-scheme: light;
            --bg: #f2efe8;
            --panel: rgba(255, 252, 246, 0.94);
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #b45309;
            --normal: #2563eb;
            --urgent: #dc2626;
            --border: rgba(31, 41, 55, 0.12);
            --shadow: 0 16px 40px rgba(31, 41, 55, 0.12);
        }

        * { box-sizing: border-box; }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-columns: 360px 1fr;
            background:
                radial-gradient(circle at top left, rgba(180, 83, 9, 0.18), transparent 28%),
                linear-gradient(135deg, #f8f3eb 0%, #ebe4d7 100%);
            color: var(--ink);
            font-family: "Segoe UI", sans-serif;
        }

        aside {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 22px;
            border-right: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 18px 0;
        }

        .stat {
            padding: 12px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .stat strong {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 14px 0 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid var(--border);
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .controls {
            margin-bottom: 16px;
        }

        select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            background: #fff;
            font-size: 14px;
        }

        .list {
            display: grid;
            flex: 1;
            gap: 10px;
            min-height: 0;
            overflow-y: auto;
            padding-right: 6px;
        }

        .card {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            background: #fff;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .card:hover,
        .card.active {
            transform: translateY(-1px);
            border-color: rgba(180, 83, 9, 0.45);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
        }

        .meta {
            display: grid;
            gap: 4px;
            color: var(--muted);
            font-size: 13px;
            text-align: left;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        @media (max-width: 900px) {
            html,
            body {
                height: auto;
                overflow: auto;
                grid-template-columns: 1fr;
                grid-template-rows: auto 65vh;
            }

            aside {
                height: auto;
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .list {
                max-height: 40vh;
            }

            #map {
                height: 65vh;
            }
        }
    </style>
</head>
<body>
    <aside>
        <h1>Карта посылок</h1>

        <div class="stats">
            <div class="stat">
                <strong id="total-count"></strong>
                <span>Всего создано</span>
            </div>
            <div class="stat">
                <strong id="processed-count"></strong>
                <span>Обработано</span>
            </div>
            <div class="stat">
                <strong id="queued-count"></strong>
                <span>В очереди</span>
            </div>
            <div class="stat">
                <strong id="total-money"></strong>
                <span>Сумма</span>
            </div>
        </div>

        <div class="legend">
            <span class="chip"><span class="dot" style="background: var(--normal);"></span>Стандарт</span>
            <span class="chip"><span class="dot" style="background: var(--urgent);"></span>Экспресс</span>
        </div>

        <div class="controls">
            <select id="package-select">
                <option value="">Выбери посылку</option>
            </select>
        </div>

        <div id="package-list" class="list"></div>
    </aside>

    <div id="map"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script>
        let payload = __PAYLOAD_JSON__;
        let packages = [];
        let selectedPackageId = null;
        let refreshTimer = null;
        let refreshInFlight = false;
        let refreshFailures = 0;

        const REFRESH_INTERVAL_MS = 1500;
        const MAX_REFRESH_FAILURES = 5;

        const map = L.map('map', { zoomControl: true }).setView([payload.map_center.lat, payload.map_center.lon], 4);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        const routeMarkersLayer = L.layerGroup().addTo(map);
        let markerMap = new Map();
        let activeRoute = null;

        function colorFor(pkg) {
            return pkg.priority === 1 ? '#dc2626' : '#2563eb';
        }

        function popupHtml(pkg) {
            const cost = pkg.cost === null ? 'ещё не рассчитана' : `${pkg.cost.toFixed(2)}`;
            const distance = pkg.distance_km === null ? 'ещё не рассчитано' : `${pkg.distance_km.toFixed(1)} км`;

            return `
                <strong>ID ${pkg.id}</strong><br>
                Откуда: ${pkg.origin}, ${pkg.origin_country}<br>
                Куда: ${pkg.destination}, ${pkg.country}<br>
                Тип: ${pkg.shipment_type}<br>
                Статус: ${pkg.status}<br>

                Вес: ${pkg.weight} кг<br>
                Расстояние: ${distance}<br>
                Стоимость: ${cost}
            `;
        }

        const select = document.getElementById('package-select');
        const list = document.getElementById('package-list');

        function updateStats() {
            document.getElementById('total-count').textContent = payload.stats.total;
            document.getElementById('processed-count').textContent = payload.stats.processed;
            document.getElementById('queued-count').textContent = payload.stats.total - payload.stats.processed;
            document.getElementById('total-money').textContent = `${payload.stats.total_cost.toFixed(2)}`;
        }

        function renderMarkers() {
            markersLayer.clearLayers();
            markerMap = new Map();

            packages.forEach(pkg => {
                const marker = L.circleMarker([pkg.lat, pkg.lon], {
                    radius: 8,
                    color: colorFor(pkg),
                    fillColor: colorFor(pkg),
                    fillOpacity: 0.85,
                    weight: 2
                }).addTo(markersLayer);

                marker.bindPopup(popupHtml(pkg));
                marker.on('click', () => selectPackage(String(pkg.id), true));
                markerMap.set(String(pkg.id), marker);
            });
        }

        function renderList() {
            select.innerHTML = '<option value="">Выбери посылку</option>';
            list.innerHTML = '';

            packages.forEach(pkg => {
                const option = document.createElement('option');
                option.value = String(pkg.id);
                option.textContent = `ID ${pkg.id} - ${pkg.destination} (${pkg.shipment_type})`;
                select.appendChild(option);

                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'card';
                card.dataset.id = String(pkg.id);
                card.innerHTML = `
                    <div class="card-head">
                        <strong>ID ${pkg.id}</strong>
                        <span class="badge" style="background:${colorFor(pkg)}">${pkg.shipment_type}</span>
                    </div>
                    <div class="meta">
                        <span>Откуда: ${pkg.origin}, ${pkg.origin_country}</span>
                        <span>Куда: ${pkg.destination}, ${pkg.country}</span>
                        <span>Статус: ${pkg.status}</span>
                        <span>Вес: ${pkg.weight} кг</span>
                    </div>
                `;
                card.addEventListener('click', () => selectPackage(String(pkg.id), true));
                list.appendChild(card);
            });
        }

        function drawRoute(pkg, fitView) {
            if (activeRoute) {
                map.removeLayer(activeRoute);
                activeRoute = null;
            }

            routeMarkersLayer.clearLayers();

            if (!pkg.route || pkg.route.length === 0) {
                return;
            }

            L.marker([pkg.start_lat, pkg.start_lon]).addTo(routeMarkersLayer)
                .bindPopup(`<strong>Отправление</strong><br>${pkg.origin}, ${pkg.origin_country}`);

            L.marker([pkg.lat, pkg.lon]).addTo(routeMarkersLayer)
                .bindPopup(`<strong>Получение</strong><br>${pkg.destination}, ${pkg.country}`);

            activeRoute = L.polyline(pkg.route, {
                color: colorFor(pkg),
                weight: 4,
                opacity: 0.85,
                dashArray: pkg.route_is_fallback ? '10 10' : null,
            }).addTo(map);

            if (fitView) {
                map.fitBounds(activeRoute.getBounds(), { padding: [40, 40] });
            }
        }

        function selectPackage(id, fitView = false) {
            selectedPackageId = id || null;
            select.value = id;

            Array.from(document.querySelectorAll('.card')).forEach(card => {
                card.classList.toggle('active', card.dataset.id === id);
            });

            const pkg = packages.find(item => String(item.id) === id);
            if (!pkg) {
                if (activeRoute) {
                    map.removeLayer(activeRoute);
                    activeRoute = null;
                }
                return;
            }

            drawRoute(pkg, fitView);

            const marker = markerMap.get(id);
            if (marker) {
                marker.openPopup();
            }
        }

        function stopRefreshLoop() {
            if (refreshTimer !== null) {
                clearTimeout(refreshTimer);
                refreshTimer = null;
            }
        }

        function scheduleRefresh(delay = REFRESH_INTERVAL_MS) {
            stopRefreshLoop();

            if (!payload.simulation_active) {
                return;
            }

            refreshTimer = window.setTimeout(() => {
                refreshTimer = null;
                refreshPayload();
            }, delay);
        }

        select.addEventListener('change', event => {
            selectPackage(event.target.value, true);
        });

        function applyPayload(nextPayload) {
            payload = nextPayload;
            packages = payload.packages.filter(item => item.lat !== null && item.lon !== null);

            updateStats();
            renderMarkers();
            renderList();

            if (selectedPackageId && packages.some(item => String(item.id) === selectedPackageId)) {
                selectPackage(selectedPackageId, false);
                return;
            }

            if (packages.length > 0) {
                selectPackage(String(packages[0].id), false);
                return;
            }

            selectPackage('', false);
        }

        async function refreshPayload() {
            if (refreshInFlight || !payload.simulation_active) {
                return;
            }

            refreshInFlight = true;

            try {
                const response = await fetch(`shipments_data.json?ts=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const nextPayload = await response.json();
                refreshFailures = 0;
                applyPayload(nextPayload);

                if (payload.simulation_active) {
                    scheduleRefresh();
                } else {
                    stopRefreshLoop();
                }
            } catch (err) {
                refreshFailures += 1;
                console.debug('Map refresh skipped', err);

                if (payload.simulation_active && refreshFailures < MAX_REFRESH_FAILURES) {
                    scheduleRefresh(REFRESH_INTERVAL_MS * Math.min(refreshFailures + 1, 4));
                } else {
                    stopRefreshLoop();
                }
            } finally {
                refreshInFlight = false;
            }
        }

        applyPayload(payload);

        if (payload.simulation_active) {
            scheduleRefresh(0);
        }
    </script>
</body>
</html>
